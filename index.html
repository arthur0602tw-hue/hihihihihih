<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>藍天與微風的終點站 - 我們的非正式告別</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Comfortaa', 'Noto Sans TC', sans-serif;
            background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%);
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* 搖晃動畫 */
        @keyframes gentle-shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }
        .shake-hover:hover {
            animation: gentle-shake 0.5s ease-in-out infinite;
        }

        /* 頂級電影感超慢速漸變（2.5 秒，極具呼吸感與優雅感） */
        .cinematic-transition {
            transition: opacity 2.5s cubic-bezier(0.16, 1, 0.3, 1), transform 2.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 背景模糊專用慢速轉場 */
        #bg-image {
            transition: opacity 1.5s ease-in-out, filter 2.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between overflow-x-hidden relative p-4 md:p-6 text-slate-100">

    <!-- 全螢幕背景圖片與中性遮罩 (漸變時間拉長，預設綁定您的合照 IMG_4245.jpg) -->
    <div class="fixed inset-0 z-0 overflow-hidden">
        <img id="bg-image" src="IMG_4245.jpg" alt="Memory Background" class="w-full h-full object-cover filter brightness-75 scale-105 opacity-0" onerror="handleBgError(this)">
        <!-- 遮罩層：第一頁是明亮舒服的天空藍漸層，故事開啟後變為無藍色、純中性的微暗遮罩 (1.5秒漸變) -->
        <div id="bg-overlay" class="absolute inset-0 bg-gradient-to-b from-sky-200/50 via-sky-300/60 to-sky-400/80 transition-all duration-[1500ms] ease-out"></div>
    </div>

    <!-- 頂部進度條與控制列 (增加 fade-in 慢速動畫) -->
    <header id="top-header" class="w-full max-w-xl mx-auto mb-4 z-20 flex flex-col space-y-2 transition-opacity duration-[2000ms] opacity-0">
        <!-- 進度條條身 -->
        <div class="w-full bg-sky-200/40 h-3 rounded-full overflow-hidden shadow-inner backdrop-blur-sm">
            <div id="progress-bar" class="bg-sky-400 h-full transition-all duration-500 shadow-lg" style="width: 10%;"></div>
        </div>
    </header>

    <!-- 核心互動卡片容器 (採用全新慢速 cinematic-transition) -->
    <main class="flex-1 flex items-center justify-center z-20 py-4 w-full">
        <div id="game-card" class="w-full max-w-lg bg-white/95 backdrop-blur-md rounded-3xl p-6 md:p-8 shadow-2xl shadow-sky-950/40 border border-white/60 flex flex-col justify-between min-h-[480px] relative cinematic-transition text-slate-800 mx-auto opacity-0 translate-y-8">
            <!-- 卡片頂部操作區：回上一頁 -->
            <div class="flex items-center justify-between w-full mb-2 min-h-[28px] z-30">
                <div id="back-btn-container"></div>
            </div>
            
            <!-- 關卡內容將由 JS 動態注入 -->
            <div id="stage-content" class="flex-1 flex flex-col justify-center items-center w-full">
                <!-- 動態載入處 -->
            </div>
        </div>
    </main>

    <!-- 頁尾宣告 (保留空容器以維持動畫，但無任何宣告文字) -->
    <footer id="bottom-footer" class="w-full text-center py-4 z-20 transition-opacity duration-[2000ms] opacity-0">
    </footer>

    <!-- 全螢幕亮片 Canvas -->
    <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-50 hidden"></canvas>

    <!-- JavaScript 核心邏輯 -->
    <script>
        // --- 狀態管理 ---
        let currentStage = 0;
        let stageProgress = [false, false, false]; // 用於追蹤每頁3個Icon的點擊狀況

        // --- 全站關卡與情感文案資料集 ---
        const stageData = [
            {
                // 封面頁
                isCover: true,
                title: "Dear Priya",
                desc: "總覺得好多話來不及跟妳說<br>所以我把想說的話都放在這裡了",
                avatar: "DSC09949.jpg",
                hint: "點擊帥哥進入"
            },
            {
                // 第二面 (第一關)
                text: "謝謝妳那天鼓起勇氣約我出來，還做了聖誕帽送我。我知道因為之前的經驗，導致妳對感情很謹慎，但即使這樣，妳依舊無所畏懼的去認識我。謝謝妳踏出了那一步，讓我們認識了彼此，也讓我有自信去喜歡一個人。",
                icons: ["💩", "💩", "💩"],
                hint: "踩完所有的牛糞進入下一頁",
                effectType: "squish"
            },
            {
                // 第三面 (第二關)
                text: "回想起來，那些聊天聊到深夜的時光，雖然我們都像死要面子的被動星人，總是小心翼翼地試探、又常常假裝不在乎，但那些期待妳回覆的瞬間，是真的非常非常快樂。",
                icons: ["👾", "👾", "👾"],
                hint: "消滅這三個擋路的傲嬌被動外星人",
                effectType: "zap"
            },
            {
                // 第四面 (第三關)
                text: "有時候我也會陷入瘋狂的小劇場。妳少回一個字，我的腦海就能生出無數種「我是不是說錯話」的猜測。雖然現在想起來覺得很蠢，但那也證明了當時，我是真的在乎妳。",
                icons: ["🎈", "🎈", "🎈"],
                hint: "戳破這三個胡思亂想的小劇場泡泡",
                effectType: "pop"
            },
            {
                // 第五面 (第四關)
                text: "我們像兩顆軌道相近卻始終無法交會的星。也許那時候我們都差了一點勇氣，也許月老那天真的在摸魚喝下午茶。但沒關係，生活本來就不完美，能與妳並肩走過這一段，就已經足夠幸運了。",
                icons: ["☕", "☕", "☕"],
                hint: "喝完這三杯摸魚下午茶，笑看所有遺憾",
                effectType: "drink"
            },
            {
                // 第六面 (第五關)
                text: "以前總是想著要找到標準答案，執著於我們到底是怎麼了、誰對誰錯。現在我明白，不用什麼事情都有標準解答，今天就用快樂的鑰匙解開這個心結，輕鬆愉快地往前走吧！",
                icons: ["🔑", "🔑", "🔑"],
                hint: "點擊三把魔法鑰匙，解開糾結的大鎖",
                effectType: "unlock"
            },
            {
                // 第七面 (第六關)
                text: "其實我的對話框裡，常常躺著好多打完又刪掉的長篇草稿。那些來不及說完的話，現在都變成溫柔的微風。今天就把那些遺留的包袱刮掉，只留下我們相遇時最單純、最美好的回憶。",
                icons: ["🎁", "🎁", "🎁"],
                hint: "拆開這三個遺留下來的溫暖禮物盒",
                effectType: "openGift"
            },
            {
                // 第八面 (第七關)
                text: "我們曾經試圖調整彼此的電波，卻總是忽遠忽近地錯過。這一次，不用再費力對焦了，讓我們把心跳和頻率都調回最舒適、最和諧的狀態，溫柔地跟那段手忙腳亂的時光道別。",
                icons: ["⚡", "⚡", "⚡"],
                hint: "消除這三個迷失方向的干擾電波",
                effectType: "sizzle"
            },
            {
                // 第九面 (第八關)
                text: "所有的彆扭與遺憾，都在今天劃下最帥氣的句點囉！不管最後的結果是什麼，我都真心希望未來的妳能天天開心，繼續大步往前走，遇到那個能夠毫無保留對妳狂奔過去的人。",
                icons: ["🍻", "🍻", "🍻"],
                hint: "乾完這三杯，讓我們瀟灑乾杯！",
                effectType: "cheersClink"
            },
            {
                // 第十面 (最後的封底)
                isFinal: true,
                text: "這是給妳的最後一封信。雖然我們沒有寫下最完美的結局，但這段路有妳同行，真的很開心。點開最後的秘密，收下我最真摯、最輕盈的祝福吧！",
                icons: ["💌", "💌", "💌"],
                hint: "拆開最後三個祝福信封",
                effectType: "openEnvelope"
            }
        ];

        // --- 電影級背景切換機制 ---
        function updateBackground(state) {
            const bgImg = document.getElementById('bg-image');
            const bgOverlay = document.getElementById('bg-overlay');
            
            if (state === 'cover') {
                // 第一面 (封面)：原本純淨的天空藍/淡藍色舒服漸層
                if (bgImg) {
                    bgImg.classList.remove('opacity-100');
                    bgImg.classList.add('opacity-0');
                }
                if (bgOverlay) {
                    bgOverlay.className = "absolute inset-0 bg-gradient-to-b from-sky-200/50 via-sky-300/60 to-sky-400/80 transition-all duration-[1500ms] ease-out";
                }
            } else if (state === 'clear') {
                // 跳關初始狀態：背景照片 100% 清楚看見，無任何藍色遮罩，僅極微中性暗度以防高光刺眼
                if (bgImg && bgImg.style.display !== 'none') {
                    bgImg.classList.remove('opacity-0');
                    bgImg.classList.add('opacity-100');
                    bgImg.style.filter = 'blur(0px) brightness(92%)';
                }
                if (bgOverlay) {
                    // 純中性，絕無藍色
                    bgOverlay.className = "absolute inset-0 bg-black/5 transition-all duration-[1500ms] ease-out";
                }
            } else if (state === 'blurry') {
                // 1.5 秒後：背景照片緩緩增加一點點模糊度 (1.5px)，同時卡片緩緩升起
                if (bgImg && bgImg.style.display !== 'none') {
                    bgImg.style.filter = 'blur(1.5px) brightness(72%)';
                }
                if (bgOverlay) {
                    // 稍加深中性暗度，烘托出白色卡片的絕佳對比度
                    bgOverlay.className = "absolute inset-0 bg-black/20 transition-all duration-[2500ms] ease-out";
                }
            }
        }

        // --- 核心渲染機制 (包含 1.5 秒背景獨佔與緩慢淡入) ---
        function renderStage() {
            const data = stageData[currentStage];
            const container = document.getElementById('stage-content');
            const backBtnContainer = document.getElementById('back-btn-container');
            const topHeader = document.getElementById('top-header');
            const bottomFooter = document.getElementById('bottom-footer');
            const card = document.getElementById('game-card');

            // 重置本頁點擊狀態
            stageProgress = [false, false, false];

            if (currentStage === 0) {
                // 封面頁：直接渲染，背景是 cover 漸層色
                updateBackground('cover');
                
                // 隱藏其他元件
                card.classList.add('opacity-0', 'translate-y-8');
                topHeader.classList.add('opacity-0');
                bottomFooter.classList.add('opacity-0');

                setTimeout(() => {
                    // 更新頂部進度條
                    const percent = ((currentStage + 1) / stageData.length) * 100;
                    document.getElementById('progress-bar').style.width = `${percent}%`;
                    backBtnContainer.innerHTML = '';

                    container.innerHTML = `
                        <div class="text-center space-y-4 mb-6 w-full">
                            <h2 class="text-4xl md:text-5xl font-black text-slate-800 tracking-tight leading-tight">${data.title}</h2>
                            <p class="text-base md:text-lg text-slate-500 leading-relaxed max-w-sm mx-auto font-semibold">${data.desc}</p>
                        </div>
                        
                        <div class="flex-1 w-full flex flex-col items-center justify-center space-y-4">
                            <div id="plane-btn" onclick="triggerPlane()" class="w-40 h-40 bg-sky-100 rounded-full flex items-center justify-center shadow-xl shadow-sky-200/60 cursor-pointer hover:bg-sky-200 transition-all duration-300 transform hover:scale-105 active:scale-95 shake-hover overflow-hidden border-4 border-white relative">
                                <img src="${data.avatar}" alt="Handsome Boy" class="w-full h-full object-cover z-10 relative" onerror="handleAvatarError(this)">
                                <div class="absolute inset-0 bg-sky-200 flex flex-col items-center justify-center text-sky-600 font-black z-0">
                                    <span class="text-5xl">👦</span>
                                </div>
                            </div>
                            <p class="text-lg md:text-xl text-sky-500 font-extrabold animate-pulse tracking-wide">${data.hint}</p>
                        </div>
                    `;

                    // 漸變顯示
                    card.classList.remove('opacity-0', 'translate-y-8');
                    topHeader.classList.remove('opacity-0');
                    bottomFooter.classList.remove('opacity-0');
                    lucide.createIcons();
                }, 200);

            } else {
                // 關卡頁面：
                // 1. 立即讓背景轉為清晰合照 (IMG_4245.jpg)，絕無藍色遮罩
                updateBackground('clear');

                // 2. 將文字卡片、進度條、頁尾完全隱藏並略向下移，創造乾淨獨占的背景觀賞期
                card.classList.add('opacity-0', 'translate-y-8');
                topHeader.classList.add('opacity-0');
                bottomFooter.classList.add('opacity-0');

                // 3. 背景照片維持清晰，停留 1.5 秒
                setTimeout(() => {
                    // 4. 照片停留結束！照片開始徐徐地、柔和地微Blur(1.5px)，遮罩變暗以增強對比
                    updateBackground('blurry');

                    // 5. 更新卡片文字與互動 Icon 的 HTML
                    const percent = ((currentStage + 1) / stageData.length) * 100;
                    document.getElementById('progress-bar').style.width = `${percent}%`;

                    backBtnContainer.innerHTML = `
                        <button onclick="prevStep()" class="flex items-center space-x-1.5 text-sm font-bold text-sky-500 hover:text-sky-600 transition-all active:scale-95">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                            <span>回上一頁</span>
                        </button>
                    `;

                    if (data.isFinal) {
                        // 最後一關
                        container.innerHTML = `
                            <div id="final-card-wrapper" class="w-full flex flex-col items-center justify-center text-center space-y-6">
                                <p class="text-lg md:text-xl text-slate-700 leading-relaxed font-bold tracking-wide text-left">${data.text}</p>
                                <div id="icon-group" class="flex justify-center space-x-6 py-4">
                                    ${data.icons.map((icon, idx) => `
                                        <button onclick="clickStoryIcon(this, ${idx}, '${data.effectType}')" class="w-16 h-16 rounded-full bg-sky-50 hover:bg-sky-100 border border-sky-200 shadow-md flex items-center justify-center text-3xl transition duration-300 transform hover:scale-110 active:scale-90 select-none">
                                            ${icon}
                                        </button>
                                    `).join('')}
                                </div>
                                <p id="icon-hint" class="text-sm md:text-base text-sky-500 font-extrabold animate-pulse tracking-wide">${data.hint}</p>
                                
                                <div id="letter-content" class="hidden bg-slate-50 border border-slate-100 rounded-2xl p-6 text-base text-slate-700 leading-relaxed text-left space-y-4 shadow-inner max-h-[280px] overflow-y-auto w-full transition-all duration-500 transform translate-y-4 opacity-0">
                                    <p class="font-bold text-sky-600 text-lg md:text-xl">嗨，Priya：</p>
                                    <p>謝謝妳耐心地點到最後！希望剛剛這些有點蠢的小互動有讓妳笑一下。</p>
                                    <p>以前我們有很多心結和話沒能好好講開，但現在想想，也許那些有點「沒說完的遺憾」，才是曖昧過程中最令人難忘的樣子。謝謝妳曾經願意走向我，也謝謝妳帶給我的所有美好回憶。</p>
                                    <p>這個網站是我最後、最輕鬆有趣的道別信。祝妳未來的日子裡天天開心，大步往前走，遇到能毫無保留向妳飛奔過去的人。</p>
                                    <p class="text-right font-bold text-sky-600 mt-5">—— 優雅退場的我 筆 ✨</p>
                                    <div class="pt-5 border-t border-slate-200 flex justify-center">
                                        <button onclick="finalConfetti()" class="bg-gradient-to-r from-sky-500 to-indigo-500 text-white text-base md:text-lg px-8 py-3 rounded-full font-black shadow hover:shadow-lg transition transform hover:scale-105 active:scale-95 flex items-center space-x-2">
                                            <span>👋 點此揮手告別（灑花！）</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        // 故事頁模板
                        container.innerHTML = `
                            <div class="w-full flex flex-col items-center justify-center text-center space-y-8 py-4">
                                <p class="text-lg md:text-xl text-slate-700 leading-relaxed font-bold tracking-wide text-left">${data.text}</p>
                                <div class="flex justify-center space-x-6 py-2">
                                    ${data.icons.map((icon, idx) => `
                                        <button onclick="clickStoryIcon(this, ${idx}, '${data.effectType}')" class="w-16 h-16 rounded-full bg-sky-50 hover:bg-sky-100 border border-sky-200 shadow-md flex items-center justify-center text-3xl transition duration-300 transform hover:scale-110 active:scale-90 select-none">
                                            ${icon}
                                        </button>
                                    `).join('')}
                                </div>
                                <p class="text-sm md:text-base text-sky-500 font-extrabold animate-pulse tracking-wide">${data.hint}</p>
                            </div>
                        `;
                    }

                    // 6. 其他元素（卡片、進度條、頁尾）以 2.5 秒的超慢過渡緩慢、高雅地淡入
                    card.classList.remove('opacity-0', 'translate-y-8');
                    topHeader.classList.remove('opacity-0');
                    bottomFooter.classList.remove('opacity-0');
                    lucide.createIcons();
                }, 1500); // 1.5秒背景獨佔停留
            }
        }

        // --- 點擊 Icon 互動與自動下一頁邏輯 (音效功能完全關閉) ---
        function clickStoryIcon(element, index, effectType) {
            if (stageProgress[index]) return; // 避免重複點擊
            
            stageProgress[index] = true;
            
            // 點擊物理特效保留
            if (effectType === 'squish') {
                element.innerHTML = "💥";
                element.className = "w-16 h-16 rounded-full bg-amber-50 border border-amber-200 shadow-inner flex items-center justify-center text-3xl transition duration-300 transform scale-90 rotate-12 opacity-85 select-none pointer-events-none";
            } else if (effectType === 'zap') {
                element.innerHTML = "✨";
                element.className = "w-16 h-16 rounded-full bg-emerald-50 border border-emerald-200 shadow-inner flex items-center justify-center text-3xl transition duration-300 transform scale-90 -rotate-12 opacity-85 select-none pointer-events-none";
            } else if (effectType === 'pop') {
                element.innerHTML = "💥";
                element.className = "w-16 h-16 rounded-full bg-rose-50 border border-rose-200 shadow-inner flex items-center justify-center text-3xl transition duration-300 transform scale-50 opacity-0 select-none pointer-events-none";
            } else if (effectType === 'drink') {
                element.innerHTML = "💨";
                element.className = "w-16 h-16 rounded-full bg-slate-50 border border-slate-200 shadow-inner flex items-center justify-center text-3xl transition duration-300 transform scale-95 opacity-50 select-none pointer-events-none";
            } else if (effectType === 'unlock') {
                element.innerHTML = "🔓";
                element.className = "w-16 h-16 rounded-full bg-emerald-50 border border-emerald-100 shadow-inner flex items-center justify-center text-3xl transition duration-300 transform scale-100 rotate-45 opacity-90 select-none pointer-events-none";
            } else if (effectType === 'openGift') {
                element.innerHTML = "🎉";
                element.className = "w-16 h-16 rounded-full bg-yellow-50 border border-yellow-200 shadow-inner flex items-center justify-center text-3xl transition duration-300 transform scale-110 opacity-100 select-none pointer-events-none animate-bounce";
            } else if (effectType === 'sizzle') {
                element.innerHTML = "💖";
                element.className = "w-16 h-16 rounded-full bg-rose-50 border border-rose-100 shadow-inner flex items-center justify-center text-3xl transition duration-300 transform scale-100 opacity-95 select-none pointer-events-none";
            } else if (effectType === 'cheersClink') {
                element.innerHTML = "🥂";
                element.className = "w-16 h-16 rounded-full bg-amber-50 border border-amber-200 shadow-inner flex items-center justify-center text-3xl transition duration-300 transform scale-105 rotate-12 opacity-95 select-none pointer-events-none";
            } else if (effectType === 'openEnvelope') {
                element.innerHTML = "✉️";
                element.className = "w-16 h-16 rounded-full bg-sky-50 border border-sky-100 shadow-inner flex items-center justify-center text-3xl transition duration-300 transform scale-100 opacity-90 select-none pointer-events-none";
            }

            // 檢查三個是否都踩完
            if (stageProgress.every(status => status === true)) {
                if (currentStage === stageData.length - 1) {
                    setTimeout(() => {
                        const iconGroup = document.getElementById('icon-group');
                        if (iconGroup) iconGroup.classList.add('hidden');
                        
                        const iconHint = document.getElementById('icon-hint');
                        if (iconHint) iconHint.classList.add('hidden');
                        
                        const letter = document.getElementById('letter-content');
                        if (letter) {
                            letter.classList.remove('hidden');
                            setTimeout(() => {
                                letter.classList.remove('translate-y-4', 'opacity-0');
                                letter.classList.add('translate-y-0', 'opacity-100');
                            }, 50);
                        }
                    }, 800);
                } else {
                    // 一般關卡自動淡出前往下一頁
                    setTimeout(() => {
                        nextStep();
                    }, 1200);
                }
            }
        }

        // [封面頁] 點擊進入
        function triggerPlane() {
            const btn = document.getElementById('plane-btn');
            btn.classList.add('scale-95', 'rotate-6', 'opacity-90');
            
            // 先讓封面卡片慢速淡出
            const card = document.getElementById('game-card');
            card.classList.add('opacity-0', 'translate-y-8');
            
            setTimeout(() => {
                nextStepDirect(); 
            }, 1000);
        }

        function nextStep() {
            if (currentStage < stageData.length - 1) {
                const card = document.getElementById('game-card');
                const topHeader = document.getElementById('top-header');
                const bottomFooter = document.getElementById('bottom-footer');
                
                card.classList.add('opacity-0', 'translate-y-8');
                topHeader.classList.add('opacity-0');
                bottomFooter.classList.add('opacity-0');
                
                setTimeout(() => {
                    currentStage++;
                    renderStage();
                }, 1200); // 卡片完全淡出後，再進行背景與頁面轉換
            }
        }

        function nextStepDirect() {
            currentStage++;
            renderStage();
        }

        function prevStep() {
            if (currentStage > 0) {
                const card = document.getElementById('game-card');
                const topHeader = document.getElementById('top-header');
                const bottomFooter = document.getElementById('bottom-footer');
                
                card.classList.add('opacity-0', 'translate-y-8');
                topHeader.classList.add('opacity-0');
                bottomFooter.classList.add('opacity-0');
                
                setTimeout(() => {
                    currentStage--;
                    renderStage();
                }, 1200);
            }
        }

        // --- 錯誤處理 ---
        function handleBgError(img) {
            console.log("本地背景圖 [IMG_4245.jpg] 暫未載入。請下載 HTML 並與照片放在同一資料夾中執行。");
            img.style.display = 'none';
        }

        function handleAvatarError(img) {
            img.style.display = 'none';
        }

        // 揮手灑花彩帶效果
        function finalConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            canvas.classList.remove('hidden');
            
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particles = [];
            const colors = ['#f43f5e', '#38bdf8', '#fbbf24', '#34d399', '#a78bfa'];

            for (let i = 0; i < 120; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach((p, index) => {
                    p.tiltAngle += p.tiltAngleIncremental;
                    p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                    p.x += Math.sin(p.tiltAngle);
                    p.tilt = Math.sin(p.tiltAngle - index / 3) * 15;

                    ctx.beginPath();
                    ctx.lineWidth = p.r;
                    ctx.strokeStyle = p.color;
                    ctx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                    ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                    ctx.stroke();
                });

                particles = particles.filter(p => p.y < canvas.height);
                if (particles.length > 0) {
                    requestAnimationFrame(draw);
                } else {
                    canvas.classList.add('hidden');
                }
            }

            draw();
        }

        // --- 視窗載入與初始化 ---
        window.onload = function() {
            lucide.createIcons();
            renderStage();
        };
    </script>
</body>
